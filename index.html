<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autolib</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Qt Bridge — URL Scheme 方式，C++ 端拦截 qtbridge:// 协议获取数据
      window.qtBridge = {
        onWebButtonClick: function(jsonStr) {
          window.location.href = 'qtbridge://onWebButtonClick?data=' + encodeURIComponent(jsonStr)
        }
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
