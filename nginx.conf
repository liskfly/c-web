server {
    listen       80;
    server_name  localhost;
    resolver 8.8.8.8 114.114.114.114 valid=30s;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # /proxy → 10.0.21.177:8082
    location /proxy/ {
        proxy_pass http://10.0.21.177:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /aishop → aishop.elecnest.cn
    location /aishop/ {
        proxy_pass https://aishop.elecnest.cn/;
        proxy_ssl_server_name on;
        proxy_set_header Host aishop.elecnest.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect ~^/(.*)$ /aishop/$1;
    }

    # pdfjs 静态资源缓存
    location /pdfjs {
        expires 7d;
    }
}
